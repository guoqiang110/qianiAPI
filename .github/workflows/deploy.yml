name: Deploy to Qianxi API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_ENV: production
      NEXT_PUBLIC_LOG_LEVEL: debug
      NEXT_PUBLIC_302_WEBSITE_URL_GLOBAL: https://qianxi-api.com/
      NEXT_PUBLIC_302_WEBSITE_URL_CHINA: https://qianxi-api.com/
      NEXT_PUBLIC_API_URL: https://qianxi-api.com
      NEXT_PUBLIC_AUTH_API_URL: https://qianxi-api.com
      NEXT_PUBLIC_AUTH_PATH: /auth
      NEXT_PUBLIC_IS_CHINA: true
      NEXT_PUBLIC_DEFAULT_LOCALE: zh
      NEXT_PUBLIC_DEFAULT_MODEL_NAME: gpt-4o-mini
      NEXT_PUBLIC_HIDE_BRAND: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: npm run build -- --no-lint

      - name: Package .next
        run: tar -czf qianxi-next-build.tar.gz .next public/tools

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "qianxi-next-build.tar.gz"
          target: "/opt/"

      - name: Restart via systemd
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/qianxi-app
            systemctl stop qianxi-app 2>/dev/null || true
            fuser -k 4175/tcp 2>/dev/null || true
            sleep 2
            rm -rf .next
            tar -xzf /opt/qianxi-next-build.tar.gz
            systemctl start qianxi-app
            sleep 4
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4175/zh || echo "000")
            echo "HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "307" ]; then
              echo "WARN: unexpected status $HTTP_CODE"
            fi
