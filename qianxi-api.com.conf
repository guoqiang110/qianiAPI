server {
    listen 80;
    server_name qianxi-api.com www.qianxi-api.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name qianxi-api.com www.qianxi-api.com;
    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/qianxi-api.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qianxi-api.com/privkey.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_proxied any;

    # ?? Qianxi new frontend (Next.js) ??
    location = /zh/console {
        return 301 /console;
    }

    location ~ ^/(zh|en|ja) {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    
    # ?? Next.js static assets ??
    location /_next {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
# ?? Static assets (old Astro) ??
    location /assets/ {
        root /opt/qianxi-docs-astro;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /pricing {
        try_files /pricing/index.html =404;
    }

    location /topup {
        try_files /topup/index.html =404;
    }

    location /changelog {
        try_files /changelog/index.html =404;
    }

    location = /dashboard {
        return 301 /console;
    }

    location = /zh/dashboard {
        return 301 /console;
    }

    location /docs {
        try_files /docs/index.html =404;
    }

    location = /studio {
        alias /opt/qianxi-docs/studio.html;
        default_type text/html;
    }

    location = /studio/ {
        return 301 /studio;
    }

    location = /image-studio {
        alias /opt/qianxi-docs/studio.html;
        default_type text/html;
    }

    location = /image-studio/ {
        return 301 /image-studio;
    }

    location = /image-studio.webmanifest {
        alias /opt/qianxi-docs/image-studio.webmanifest;
        default_type application/manifest+json;
    }

    location = /studio-sw.js {
        alias /opt/qianxi-docs/studio-sw.js;
        default_type application/javascript;
        add_header Service-Worker-Allowed /;
    }

    location = /playground {
        alias /opt/qianxi-docs/playground.html;
        default_type text/html;
    }

    location = /cs-chat {
        alias /opt/qianxi-docs/cs-chat.html;
        default_type text/html;
    }

    location = /cs-chat/ {
        return 301 /cs-chat;
    }

    location = /translation {
        alias /opt/qianxi-docs/translation.html;
        default_type text/html;
    }

    location = /translation/ {
        return 301 /translation;
    }

    location = /writing {
        alias /opt/qianxi-docs/writing.html;
        default_type text/html;
    }

    location = /writing/ {
        return 301 /writing;
    }

    location = /playground/ {
        return 301 /playground;
    }

    location /image-tools {
        try_files /image-tools/index.html =404;
    }

    location /video {
        try_files /video/index.html =404;
    }

    location /agent {
        try_files /agent/index.html =404;
    }

    location /text {
        try_files /text/index.html =404;
    }

    location ~ ^/api/([a-z0-9-]+)$ {
        try_files /api/$1/index.html =404;
    }

    location /models {
        try_files /models/index.html =404;
    }

    location = /model-admin {
        alias /opt/qianxi-docs/model-admin.html;
        default_type text/html;
    }

    location = /model-admin/ {
        return 301 /model-admin;
    }

    location = /sitemap.xml { return 301 /sitemap-index.xml; }
    location = /sitemap-index.xml { try_files /sitemap-index.xml =404; }
    location = /sitemap-0.xml { try_files /sitemap-0.xml =404; }
    location = /robots.txt { try_files /robots.txt =404; }

    # ?? API routes ??
    location = /v1/responses {
        proxy_pass http://127.0.0.1:4182;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location = /api/status {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types application/json;
        sub_filter 'https://docs.newapi.pro' 'https://qianxi-api.com/docs';
    }

    location /api/studio-assets {
        proxy_pass http://127.0.0.1:4180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/cn-image/withdraw {
        proxy_pass http://127.0.0.1:4183;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /api/cn-image {
        proxy_pass http://127.0.0.1:4181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    
    # ?? New-API console with injected back button ??
    location = /console {
        proxy_pass http://127.0.0.1:3000/console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter '</body>' '<a href="/zh" style="position:fixed;left:20px;top:20px;z-index:99999;padding:8px 16px;border-radius:10px;background:#7c3aed;color:#fff;text-decoration:none;font:600 13px -apple-system,BlinkMacSystemFont,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;box-shadow:0 4px 16px rgba(124,58,237,.28);border:1px solid rgba(255,255,255,.12);">? ??????</a></body>';
    }

    # ?? Static tools (SEO/GEO) ??
    location /tools/ {
        proxy_pass http://127.0.0.1:4175;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # ?? Root ? redirect to /zh ??
    location = / {
        return 301 /zh;
    }

    # ?? Catch-all ? New-API ??
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}